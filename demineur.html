<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démineur - Jouer en ligne</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      margin: 0;
      background-color: #0d1117; /* Assorti au thème sombre */
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    header {
      width: 100%;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: flex-start;
      box-sizing: border-box;
      background: rgba(13, 17, 23, 0.8);
      backdrop-filter: blur(10px);
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .btn-back {
      color: #8b949e;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    #game-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
    }
    #cheerpjDisplay {
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      background: transparent;
    }
    .loading-container {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-text {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      animation: pulse 1.5s infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <a href="projets.html#demineur" class="btn-back">
      <i class="fa-solid fa-arrow-left"></i> Retour aux projets
    </a>
  </header>
  <div id="game-container">
    <div class="loading-container" id="loadingContainer">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Chargement de l'environnement Java (cela peut prendre quelques secondes)...</div>
    </div>
    <div id="cheerpjDisplay"></div>
  </div>

  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <script>
    async function initGame() {
      try {
        await cheerpjInit();
        const displayDiv = document.getElementById("cheerpjDisplay");
        // Creates auto-sized display container
        cheerpjCreateDisplay(800, 600, displayDiv);

        // Launch LanceurGraphique from the jar in the assets folder
        await cheerpjRunMain("fr.sae.demineur.LanceurGraphique", "/app/assets/demineur.jar");

        document.getElementById("loadingContainer").style.display = "none";
      } catch (err) {
        console.error("CheerpJ error:", err);
        document.getElementById("loadingText").textContent = "Une erreur est survenue lors du chargement du jeu.";
        document.querySelector(".loading-spinner").style.display = "none";
      }
    }
    initGame();
  </script>
</body>
</html>
