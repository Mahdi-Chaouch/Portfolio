<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription - Compagnons</title>
<link rel="icon" type="image/png" href="../images/logo_simple.png">
  <link rel="stylesheet" href="../CSS/elemental.css">
  <link rel="stylesheet" href="../CSS/auth.css">
</head>

<body>        <button id="scrollTopBtn" title="Remonter en haut">↑</button>
  <div id="site-header"></div>

  <main>
    <section class="hero-auth">
      <div class="auth-overlay">
        <form class="auth-form" action="../feed/feed.html" method="get">            
          <h1>Creer un compte</h1>
          <p>Rejoins Compagnons et commence a partager des moments avec ton animal.</p>

          <div class="auth-field">
            <label for="pseudo">Pseudo</label>
            <input id="pseudo" name="pseudo" type="text" placeholder="ex: Lucas76" required>
          </div>

          <div class="auth-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="ton@email.com" required>
          </div>

          <div class="auth-field">
            <label for="password">Mot de passe</label>
            <input id="password" name="password" type="password" placeholder="********" required>
          </div>

          <div class="auth-field">
            <label for="password2">Confirmer le mot de passe</label>
            <input id="password2" name="password2" type="password" placeholder="********" required>
          </div>

          <div class="auth-row">
            <label class="auth-check">
              <input type="checkbox" required>
              J'accepte les <a class="auth-link" href="/légal/regles.html">regles</a> et la
              <a class="auth-link" href="/légal/politique-confidentialite.html">confidentialite</a>
            </label>
          </div>

          <div class="auth-actions">
            <a class="auth-btn auth-btn--primary" href="../feed/feed.html">Creer mon compte</a>
            <a class="auth-btn auth-btn--outline" href="connexion.html">J'ai deja un compte</a>
          </div>

        </form>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="../js/include.js"></script>
</body>
</html>
